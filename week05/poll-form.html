<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 05 - Poll Form</title>
</head>

<body>

    <header>
        <h1>Community Poll</h1>
        <p>We'd love to hear from you! Please fill out the form below.</p>
    </header>

    <main>
        <form>

            <!-- Full Name -->
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>

            <!-- Email -->
            <label for="useremail">Email:</label>
            <input type="email" id="useremail" name="useremail" required>

            <!-- Favorite Browser -->
            <label for="browser">What is your favorite internet browser?</label>
            <select id="browser" name="browser">
                <option value="chrome">Chrome</option>
                <option value="safari">Safari</option>
                <option value="edge">Edge</option>
                <option value="brave">Brave</option>
                <option value="other">Other</option>
            </select>

            <!-- Household Pet -->
            <label for="pet">Do you have a household pet?</label>
            <input type="checkbox" id="pet" name="pet">

            <!-- Places Lived -->
            <label for="feedback">List the places you have lived:</label>
            <textarea id="feedback" name="feedback" rows="4"
              placeholder="e.g. Buenos Aires Argentina, Madrid Spain, New York USA"></textarea>

            <!-- Submit Button -->
            <button type="submit">Submit Poll</button>

        </form>
    </main>

    <footer>
        <p>Copyright &copy; 2025 | WDD 130</p>
    </footer>

</body>

</html>
