<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description"
      content="Contact Whitewater Rafting to book your next adventure, ask questions, or get more information about our guided rafting trips.">
    <meta name="author" content="Ezequiel Lezcano">

    <title>Contact Us | Whitewater Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/rafting-logo.png" alt="Whitewater rafting company logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <!-- COMPANY INFO -->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p class="info-text">Malleo 343</p>
            <p class="info-text">Junin de los andes, Neuquén</p>
            <p class="info-text">+1 999 999 9999</p>
            <p class="info-text">info@whitewater.com</p>
        </section>

        <!-- MAP + FORM -->
        <section class="contact-grid">

            <!-- GOOGLE MAP -->
            <div class="map">
                <!-- inline style removed — border handled via .map-iframe in rafting.css -->
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14552.549187607168!2d-71.07336351379575!3d-39.93475453641334!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x96119b0036621b35%3A0x469e38cb4a747a17!2sLANIN%20punto%20de%20encuentro%20Rafting!5e0!3m2!1ses!2sar!4v1775066811585!5m2!1ses!2sar"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade" class="map-iframe"></iframe>
            </div>

            <!-- CONTACT FORM -->
            <form class="contact-form">

                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <fieldset>
                    <legend>Message Purpose</legend>

                    <input type="radio" id="general" name="purpose" value="general" checked>
                    <label for="general">General Inquiry</label>

                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    <label for="reservation">Reservation Question</label>

                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    <label for="suggestion">Website Suggestion</label>
                </fieldset>

                <!-- textarea added to meet audit requirement -->
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5"
                  placeholder="Write your message here..."></textarea>

                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Please subscribe me to the monthly newsletter</label>

                <button type="submit">Send Message</button>

            </form>
        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">

                <figure>
                    <img src="images/employee1.jpg" alt="River Guide">
                    <figcaption>John Smith - Lead River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Safety Instructor">
                    <figcaption>Emily Johnson - Safety Instructor</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Trip Coordinator">
                    <figcaption>Michael Brown - Trip Coordinator</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>©2026 🛶 Whitewater Rafting company | Ezequiel Lezcano</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Linkedin Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
